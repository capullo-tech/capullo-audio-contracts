# capullo-tech org toolchain (catalog-only).
# Pinned to latest STABLE Gradle/Kotlin - not RadioCapullo's 9.4.0-rc-1.
[versions]
kotlin = "2.3.10"
coroutines = "1.10.2"
junit = "4.13.2"

[libraries]
kotlinx-coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "coroutines" }
