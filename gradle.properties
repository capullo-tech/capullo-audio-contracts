org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.caching=true
# Pure-JVM (builds locally without an SDK), but also built as a composite over the network share when a
# source repo includes it - disable VFS/BTree caching there too, to avoid share file-lock IOExceptions.
org.gradle.vfs.watch=false
org.gradle.buildOutputCleanup.enabled=false
kotlin.code.style=official
